name: Remote Private Build

on:
  workflow_dispatch:
    inputs:
      job_type:
        description: "任务类型: build-only 或 ota"
        required: true
        default: "ota"
        type: choice
        options: [build-only, ota]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Private Workflow via API
        run: |
          REPO="${{ secrets.PRIVATE_REPO }}"          
          WORKFLOW="build-ota.yaml"
          
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/$REPO/actions/workflows/$WORKFLOW/dispatches \
            -d "{\"ref\":\"master\", \"inputs\": {\"job_type\": \"${{ github.event.inputs.job_type }}\"}}" # 👈 这里的 ref 已改成 master
